<!doctype html>
<html
  lang="zh-Hant"
  data-codex-interface-theme="active"
  data-cit-appearance="dark"
  data-cit-has-image="true"
  data-cit-workspace-treatment="native"
  data-cit-task-mode="ambient"
  data-cit-mode="sidebar-art"
  data-cit-character="true"
  data-cit-character-placement="sidebar-hero"
  data-cit-icon-badge="true"
  data-cit-safe-area="sides"
>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frosted Glass Current Theme Preview</title>
  <link rel="stylesheet" href="../assets/theme.css">
  <style>
    :root {
      --cit-bg-image: url("../assets/backgrounds/cyber-ruins-pale.png");
      --cit-character-image: url("../assets/icons/cyber-mecha-cat-male-helmet-900.png");
      --cit-bg-focus-x: 58%;
      --cit-bg-focus-y: 50%;
      --cit-character-size: 350px;
      --cit-character-opacity: 1;
      --cit-badge-size: 58px;
      --cit-badge-opacity: 0.92;
      color-scheme: dark;
      font-family: ui-rounded, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #f4f7fb;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 306px minmax(0, 1fr) 332px;
      gap: 18px;
      padding-right: 18px;
    }

    aside.app-shell-left-panel {
      min-height: 100vh;
      padding: 18px 16px;
    }

    .titlebar {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: rgba(244, 247, 251, 0.86);
      font-weight: 700;
    }

    .nav-row,
    .task-row,
    .panel-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      padding: 0 10px;
      border-radius: 12px;
      color: rgba(244, 247, 251, 0.78);
      font-weight: 650;
    }

    .nav-row.active,
    .task-row.active,
    .panel-row.active {
      color: #f4f7fb;
      background: rgba(0, 213, 255, 0.075);
      box-shadow: inset 3px 0 0 #00d5ff;
    }

    .glyph {
      width: 20px;
      height: 20px;
      border-radius: 7px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .section-label {
      margin: 26px 0 8px;
      color: rgba(255, 176, 0, 0.78);
      font-size: 12px;
      font-weight: 800;
    }

    main {
      min-width: 0;
      padding: 52px 0 110px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .top-card {
      width: min(780px, 100%);
      margin: 0 auto;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
    }

    .message-card {
      width: min(780px, 100%);
      margin: 0 auto;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
    }

    .line {
      height: 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      margin: 11px 0;
    }

    .line.short {
      width: 58%;
    }

    .line.mid {
      width: 78%;
    }

    .change-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .change-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.026);
      border: 1px solid rgba(255, 255, 255, 0.055);
      color: rgba(244, 247, 251, 0.78);
    }

    .codex-interface-theme-project-panel .panel-row {
      border: 1px solid rgba(255, 255, 255, 0.045);
      background: rgba(255, 255, 255, 0.018);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.028);
    }

    .codex-interface-theme-project-panel .panel-row.active {
      border-color: rgba(0, 213, 255, 0.28);
    }

    .codex-interface-theme-project-panel .panel-row:hover {
      background: rgba(255, 255, 255, 0.038);
    }

    .composer-surface-chrome {
      position: fixed;
      left: calc(306px + 18px + 12vw);
      right: calc(332px + 36px + 8vw);
      bottom: 30px;
      min-height: 106px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .composer-placeholder {
      color: rgba(244, 247, 251, 0.44);
      font-size: 19px;
      margin-bottom: 28px;
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(244, 247, 251, 0.70);
    }

    .codex-interface-theme-project-panel {
      align-self: start;
      margin-top: 52px;
      min-height: 520px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .codex-interface-theme-project-panel header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px 12px;
      margin-bottom: 12px;
      font-weight: 800;
    }

    .codex-interface-theme-project-panel-section {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .project-count {
      color: #00f5a0;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    #codex-interface-theme-character,
    #codex-interface-theme-badge,
    #codex-interface-theme-right-hud {
      position: fixed;
    }
  </style>
</head>
<body>
  <div id="codex-interface-theme-backdrop"></div>
  <div id="codex-interface-theme-right-hud"></div>
  <div class="app-shell">
    <aside class="app-shell-left-panel">
      <div class="titlebar"><span class="glyph"></span>Codex</div>
      <div class="nav-row"><span class="glyph"></span>搜尋</div>
      <div class="nav-row active"><span class="glyph"></span>新增任務</div>
      <div class="nav-row"><span class="glyph"></span>專案</div>
      <div class="nav-row"><span class="glyph"></span>Pull Request</div>
      <div class="nav-row"><span class="glyph"></span>網站</div>
      <div class="nav-row"><span class="glyph"></span>已排程</div>
      <div class="nav-row"><span class="glyph"></span>外掛程式</div>
      <div class="section-label">已訂選</div>
      <div class="task-row">Build Week Demo</div>
      <div class="task-row">Theme workflow review</div>
      <div class="task-row">Runtime verification</div>
      <div class="task-row active">分析並重建 Dream Skin 結構</div>
      <div id="codex-interface-theme-badge"></div>
    </aside>

    <main>
      <section class="top-card rounded-xl border">
        <strong>Codex Dream Skin</strong>
        <div class="line mid"></div>
        <div class="line short"></div>
      </section>

      <section class="message-card rounded-xl border">
        <strong>毛玻璃工作窗測試</strong>
        <div class="line"></div>
        <div class="line mid"></div>
        <div class="change-list">
          <div class="change-row"><span>macos/assets/theme.css</span><span class="project-count">+86 -12</span></div>
          <div class="change-row"><span>docs/PROJECT_LOG.md</span><span class="project-count">+31 -0</span></div>
          <div class="change-row"><span>launcher state</span><span class="project-count">synced</span></div>
        </div>
      </section>
    </main>

    <aside class="codex-interface-theme-project-panel" data-cit-panel-kind="resource-summary">
      <header><span>環境</span><span>＋</span></header>
      <div class="codex-interface-theme-project-panel-content">
        <section class="codex-interface-theme-project-panel-section">
          <button class="panel-row active"><span class="glyph"></span>變更</button>
          <button class="panel-row"><span class="glyph"></span>本機</button>
          <button class="panel-row"><span class="glyph"></span>main</button>
          <button class="panel-row"><span class="glyph"></span>送交或推送</button>
        </section>
        <section class="codex-interface-theme-project-panel-section">
          <header><span>來源</span><span>＋</span></header>
          <button class="panel-row"><span class="glyph"></span>demo-source-preview.png</button>
          <button class="panel-row"><span class="glyph"></span>theme.css</button>
          <button class="panel-row"><span class="glyph"></span>查看全部</button>
        </section>
      </div>
    </aside>
  </div>

  <div id="codex-interface-theme-character"></div>
  <div class="composer-surface-chrome">
    <div class="composer-placeholder">什麼都能做</div>
    <div class="composer-actions">
      <span>＋　代我核准</span>
      <span>5.5 極高　↑</span>
    </div>
  </div>
</body>
</html>
